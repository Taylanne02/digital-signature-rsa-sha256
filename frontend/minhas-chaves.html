<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minhas Chaves</title>

<link rel="stylesheet" href="CSS/global.css">
<link rel="stylesheet" href="CSS/form.css">
</head>

<body>

<div class="container">

<h2>Minhas Chaves</h2>

<p id="usuario"></p>

<div id="msg" class="message"></div>

<input id="senha" type="password"
placeholder="Confirme sua senha">

<button onclick="baixarPrivada()">
Baixar chave privada
</button>

<br><br>

<button class="secondary" onclick="voltar()">Voltar</button>

</div>

<script src="js/ui.js"></script>
<script>

const userId = localStorage.getItem("userId");
const nome = localStorage.getItem("nome");
const msg = document.getElementById("msg");

if(!userId){
    window.location.href="login.html";
}

document.getElementById("usuario").innerText =
    "Logado como: " + nome;


async function baixarPrivada(){

    const senha = document.getElementById("senha").value;

    clearMessage(msg);

    if(!senha){
        showMessage(msg, "Digite sua senha.", 'error', 12000);
        return;
    }

    try{

        const res = await fetch(
            "http://localhost:3000/download-private-key",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({userId,senha})
            }
        );

        const data = await res.json();

        if(!res.ok){
            showMessage(msg, data.erro || "Erro ao baixar chave.", 'error', 12000);
            return;
        }

        const blob = new Blob([data.privateKey],{
            type:"application/x-pem-file"
        });

        const a = document.createElement("a");

        a.href = URL.createObjectURL(blob);
        a.download = "privateKey.pem";
        a.click();

        showMessage(msg, "Download iniciado com sucesso!", 'success', 12000);

        document.getElementById("senha").value="";

    }catch(err){
        console.error(err);
        showMessage(msg, "Erro ao baixar chave.", 'error', 12000);
    }
}

function voltar(){
    window.location.href="menu.html";
}

</script>

</body>
</html>
