<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chaves Públicas</title>

<link rel="stylesheet" href="CSS/global.css">
<link rel="stylesheet" href="CSS/form.css">
</head>

<body>

<div class="container">

<h2>Chaves Públicas</h2>

<button onclick="location.href='menu.html'">Voltar</button>

<ul id="lista"></ul>

<button onclick="location.href='menu.html'">Voltar</button>

</div>

<script>

async function carregar(){

const res=await fetch(
"http://localhost:3000/public-keys"
);

const dados=await res.json();

dados.forEach(u=>{

const li=document.createElement("li");

li.innerHTML=
`${u.nome}
<button onclick="baixar(${u.id})">
Baixar
</button>`;

lista.appendChild(li);
});
}

function baixar(id){
window.open(
"http://localhost:3000/download-public-key/"+id
);
}

carregar();

</script>
</body>
</html>
