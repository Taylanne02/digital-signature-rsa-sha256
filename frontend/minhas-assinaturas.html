<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minhas Assinaturas</title>

<link rel="stylesheet" href="CSS/global.css">
<link rel="stylesheet" href="CSS/form.css">
</head>

<body>

<div class="container">

<h2>Minhas Assinaturas</h2>

<ul id="lista"></ul>

<button onclick="location.href='menu.html'">Voltar</button>

</div>

<script>

const userId=localStorage.getItem("userId");
if(!userId) location.href="login.html";

async function carregar(){

const res=await fetch(
"http://localhost:3000/my-signatures/"+userId
);

const dados=await res.json();

lista.innerHTML="";

dados.forEach(a=>{

const li=document.createElement("li");

li.innerHTML=
a.texto.substring(0,30)+"... "+
`<a href="verificar.html?id=${a.id}">
Verificar
</a>`;

lista.appendChild(li);
});
}

carregar();

</script>
</body>
</html>
