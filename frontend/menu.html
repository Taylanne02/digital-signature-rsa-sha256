<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Menu</title>

<link rel="stylesheet" href="CSS/global.css">
<link rel="stylesheet" href="CSS/form.css">
</head>

<body>

<div class="container">

<h2>Menu Principal</h2>

<p id="usuario"></p>

<button onclick="go('assinar.html')">Assinar Texto</button>
<button onclick="go('minhas-assinaturas.html')">Minhas Assinaturas</button>
<button onclick="go('minhas-chaves.html')">Minhas Chaves</button>
<button onclick="go('chaves-publicas.html')">Chaves Públicas</button>
<button onclick="go('cadastro.html')">Novo Usuário</button>

<button onclick="logout()">Logout</button>

</div>

<script>

const userId=localStorage.getItem("userId");
const nome=localStorage.getItem("nome");

if(!userId) location.href="login.html";

usuario.innerText="Logado como: "+nome;

function go(p){
    window.location.href=p;
}

function logout(){
    localStorage.clear();
    location.href="login.html";
}

</script>
</body>
</html>
