<h2>Verificar Assinatura</h2>

<p id="usuario"></p>

<div id="resultado"></div>

<script>

const userId = localStorage.getItem("userId");
const nome = localStorage.getItem("nome");

if(!userId){
    alert("Faça login primeiro!");
    window.location.href="login.html";
}

document.getElementById("usuario").innerText =
    "Logado como: " + nome;

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function verificar(){

    if(!id){
        document.getElementById("resultado")
            .innerText = "ID da assinatura inválido.";
        return;
    }

    try{

        const res =
            await fetch("http://localhost:3000/verify/" + id);

        const data = await res.json();

        /* ===== FORMATA DATA BR ===== */

        let dataFormatada = data.data;

        // se vier ISO do banco, converte
        if(!isNaN(Date.parse(data.data))){
            dataFormatada = new Date(data.data)
                .toLocaleString("pt-BR");
        }

        document.getElementById("resultado").innerText =
            "Resultado: " + data.resultado +
            "\nUsuário: " + data.usuario +
            "\nAlgoritmo: " + data.algoritmo +
            "\nData: " + dataFormatada;

    }catch(err){
        console.error(err);
        document.getElementById("resultado")
            .innerText = "Erro ao verificar assinatura.";
    }
}

verificar();

</script>
