<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verificar</title>

<link rel="stylesheet" href="CSS/global.css">
<link rel="stylesheet" href="CSS/form.css">
</head>

<body>

<div class="container">

<h2>Verificar Assinatura</h2>

<p id="usuario"></p>

<pre id="resultado"></pre>

<button onclick="voltar()">Voltar</button>

</div>

<script>

const userId = localStorage.getItem("userId");
const nome = localStorage.getItem("nome");

if(!userId) location.href="login.html";

document.getElementById("usuario").innerText =
"Logado como: " + nome;

const id = new URLSearchParams(location.search).get("id");

let jaVerificou = false;

async function verificar(){

    if(jaVerificou) return;
    jaVerificou = true;

    const res = await fetch(
        "http://localhost:3000/verify/" + id
    );

    const data = await res.json();

    /* ===== FORMATA DATA PADRÃO BRASIL ===== */

    let dataBR = data.data;

    const dataObj = new Date(data.data);

    if(!isNaN(dataObj)){
        dataBR = dataObj.toLocaleString("pt-BR", {
            timeZone: "America/Araguaina"
        });
    }

    resultado.innerText =
`Resultado: ${data.resultado}
Usuário: ${data.usuario}
Algoritmo: ${data.algoritmo}
Data: ${dataBR}`;
}

function voltar(){
    window.location.href="minhas-assinaturas.html";
}

/* executa UMA vez só */
window.addEventListener("DOMContentLoaded", verificar);

</script>
</body>
</html>
