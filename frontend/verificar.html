<h2>Verificar Assinatura</h2>

<p id="usuario"></p>

<div id="resultado"></div>

<canvas id="qrcode"></canvas>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

const userId = localStorage.getItem("userId");
const nome = localStorage.getItem("nome");

if(!userId){
    alert("Faça login primeiro!");
    window.location.href="login.html";
}

document.getElementById("usuario")
.innerText = "Logado como: " + nome;

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function verificar(){

    if(!id){
        document.getElementById("resultado")
            .innerText = "ID da assinatura inválido.";
        return;
    }

    try{

        const res =
            await fetch("http://localhost:3000/verify/" + id);

        const data = await res.json();

        // Formatar data
        const dataFormatada =
            new Date(data.data).toLocaleString("pt-BR");

        
        document.getElementById("resultado").innerText =
            "Resultado: " + data.resultado +
            "\nUsuário: " + data.usuario +
            "\nAlgoritmo: " + data.algoritmo +
            "\nData: " + dataFormatada;

        //QR CODE
        QRCode.toCanvas(
            document.getElementById("qrcode"),
            "http://localhost:3000/verify/" + id
        );

    }catch(err){
        console.error(err);
        document.getElementById("resultado")
            .innerText = "Erro ao verificar assinatura.";
    }
}

verificar();

</script>
