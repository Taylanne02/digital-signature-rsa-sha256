<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assinar</title>

<link rel="stylesheet" href="CSS/global.css">
<link rel="stylesheet" href="CSS/form.css">
</head>

<body>

<div class="container">

<h2>Assinar Texto</h2>

<p id="usuario"></p>
<div id="msg"></div>

<textarea id="texto" placeholder="Digite o texto"></textarea>

<input id="senha" type="password" placeholder="Confirme sua senha">

<button onclick="assinar()">Assinar</button>
<button onclick="voltar()">Voltar</button>
<button onclick="logout()">Sair</button>

</div>

<script>

const userId=localStorage.getItem("userId");
const nome=localStorage.getItem("nome");

if(!userId) location.href="login.html";

usuario.innerText="Logado como: "+nome;

async function assinar(){

const res=await fetch("http://localhost:3000/sign",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
userId,
texto:texto.value,
senha:senha.value
})
});

const data=await res.json();

if(!res.ok){
msg.innerText=data.erro;
return;
}

msg.innerText="Assinatura criada! ID: "+data.assinaturaId;

texto.value="";
senha.value="";
}

function logout(){
localStorage.clear();
location.href="login.html";
}

function voltar(){
    window.location.href="menu.html";
}

</script>
</body>
</html>
